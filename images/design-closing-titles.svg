<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080">
  <defs>
    <!-- Background: deep slate matching the website -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#020617" />
      <stop offset="50%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e293b" />
    </linearGradient>

    <!-- Film grain overlay -->
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.04"/>
      </feComponentTransfer>
    </filter>

    <!-- Soft glow for accent elements -->
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Vignette -->
    <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
      <stop offset="60%" stop-color="transparent"/>
      <stop offset="100%" stop-color="#020617" stop-opacity="0.7"/>
    </radialGradient>

    <!-- Accent gradient: blue to emerald -->
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>

    <!-- Glassmorphism card fill -->
    <linearGradient id="glassGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.05)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.02)"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1920" height="1080" fill="url(#bgGrad)"/>

  <!-- Subtle film grain -->
  <rect width="1920" height="1080" filter="url(#grain)"/>

  <!-- Vignette -->
  <rect width="1920" height="1080" fill="url(#vignette)"/>

  <!-- Decorative blurred orbs (matching website hero) -->
  <circle cx="300" cy="200" r="350" fill="#3b82f6" opacity="0.04" filter="url(#softGlow)"/>
  <circle cx="1600" cy="850" r="400" fill="#10b981" opacity="0.04" filter="url(#softGlow)"/>

  <!-- ════════ TOP ACCENT LINE ════════ -->
  <g transform="translate(960, 100)">
    <line x1="-200" y1="0" x2="200" y2="0" stroke="url(#accentGrad)" stroke-width="2" opacity="0.6"/>
  </g>

  <!-- ════════ MAIN TITLE ════════ -->
  <g transform="translate(960, 200)">
    <text text-anchor="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-weight="800" font-size="96" fill="#f8fafc" letter-spacing="-0.03em">
      TALK-TECH
    </text>
    <text y="55" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-weight="300" font-size="26" fill="#94a3b8" letter-spacing="0.05em">
      AI-POWERED CONVERSATION SIMULATION
    </text>
  </g>

  <!-- ════════ BOTTOM ACCENT LINE ════════ -->
  <g transform="translate(960, 300)">
    <line x1="-200" y1="0" x2="200" y2="0" stroke="url(#accentGrad)" stroke-width="2" opacity="0.6"/>
  </g>

  <!-- ════════ PROJECT INFO ════════ -->
  <g transform="translate(960, 380)">
    <text text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-weight="600" font-size="13" fill="#3b82f6" letter-spacing="0.2em" text-transform="uppercase">
      A HACKASTONE PROJECT
    </text>
    <text y="40" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-weight="400" font-size="18" fill="#cbd5e1">
      Zurich University of Teacher Education (PHZH)
    </text>
    <text y="68" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-weight="400" font-size="16" fill="#64748b">
      Funded by the Digitalization Initiative of the Zurich Universities (DIZH)
    </text>
  </g>

  <!-- ════════ TEAM ════════ -->
  <g transform="translate(960, 530)">
    <text text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-weight="600" font-size="13" fill="#3b82f6" letter-spacing="0.2em" text-transform="uppercase">
      THE TEAM
    </text>

    <!-- Team member cards in a 2x2 grid -->
    <g transform="translate(-420, 40)">
      <!-- Card 1: Oliver -->
      <g transform="translate(0, 0)">
        <rect width="400" height="70" rx="16" fill="url(#glassGrad)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
        <text x="200" y="28" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-weight="600" font-size="18" fill="#f1f5f9">Oliver Schulthess</text>
        <text x="200" y="52" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-weight="400" font-size="14" fill="#64748b">Project Lead &amp; Didactic Concept</text>
      </g>

      <!-- Card 2: Jonas -->
      <g transform="translate(440, 0)">
        <rect width="400" height="70" rx="16" fill="url(#glassGrad)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
        <text x="200" y="28" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-weight="600" font-size="18" fill="#f1f5f9">Jonas Schubnell</text>
        <text x="200" y="52" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-weight="400" font-size="14" fill="#64748b">AI Prompt Engineering &amp; Prototyping</text>
      </g>

      <!-- Card 3: Aaron -->
      <g transform="translate(0, 90)">
        <rect width="400" height="70" rx="16" fill="url(#glassGrad)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
        <text x="200" y="28" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-weight="600" font-size="18" fill="#f1f5f9">Aaron Schmid</text>
        <text x="200" y="52" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-weight="400" font-size="14" fill="#64748b">Technical Architecture &amp; XR Integration</text>
      </g>

      <!-- Card 4: Colin -->
      <g transform="translate(440, 90)">
        <rect width="400" height="70" rx="16" fill="url(#glassGrad)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
        <text x="200" y="28" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-weight="600" font-size="18" fill="#f1f5f9">Colin Schmid</text>
        <text x="200" y="52" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-weight="400" font-size="14" fill="#64748b">Interaction Design</text>
      </g>
    </g>
  </g>

  <!-- ════════ PARTNERS ════════ -->
  <g transform="translate(960, 780)">
    <text text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-weight="600" font-size="13" fill="#3b82f6" letter-spacing="0.2em" text-transform="uppercase">
      PARTNERS &amp; ECOSYSTEM
    </text>

    <!-- Partner logo boxes -->
    <g transform="translate(-420, 40)">
      <!-- PHZH -->
      <g transform="translate(0, 0)">
        <rect width="200" height="90" rx="16" fill="url(#glassGrad)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
        <text x="100" y="35" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-weight="700" font-size="20" fill="#e2e8f0">PHZH</text>
        <text x="100" y="58" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-weight="400" font-size="11" fill="#64748b">Pädagogische Hochschule Zürich</text>
        <text x="100" y="76" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-weight="400" font-size="10" fill="#475569">Academic Partner</text>
      </g>

      <!-- afca -->
      <g transform="translate(220, 0)">
        <rect width="200" height="90" rx="16" fill="url(#glassGrad)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
        <text x="100" y="40" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-weight="700" font-size="22" fill="#e2e8f0">afca. ag</text>
        <text x="100" y="68" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-weight="400" font-size="11" fill="#64748b">Technology Partner</text>
      </g>

      <!-- DIZH -->
      <g transform="translate(440, 0)">
        <rect width="200" height="90" rx="16" fill="url(#glassGrad)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
        <text x="100" y="40" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-weight="700" font-size="22" fill="#e2e8f0">DIZH</text>
        <text x="100" y="68" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-weight="400" font-size="11" fill="#64748b">Digitalization Initiative ZH</text>
      </g>

      <!-- FutureMEM -->
      <g transform="translate(660, 0)">
        <rect width="200" height="90" rx="16" fill="url(#glassGrad)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
        <text x="100" y="40" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-weight="700" font-size="20" fill="#e2e8f0">FutureMEM</text>
        <text x="100" y="68" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-weight="400" font-size="11" fill="#64748b">Curriculum Reform</text>
      </g>
    </g>
  </g>

  <!-- ════════ TAGLINE ════════ -->
  <g transform="translate(960, 960)">
    <text text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-weight="500" font-size="16" fill="#94a3b8" letter-spacing="0.02em">
      Enabling every student to practice realistic technical conversations in English
    </text>
  </g>

  <!-- ════════ CONTACT / URL ════════ -->
  <g transform="translate(960, 1000)">
    <text text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-weight="600" font-size="18" fill="#3b82f6" letter-spacing="0.05em">
      wagemutig.github.io/talktech
    </text>
  </g>

  <!-- ════════ FOOTER ════════ -->
  <text x="960" y="1060" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-weight="400" font-size="13" fill="#334155" letter-spacing="0.05em">
    © 2026 TALK-TECH TEAM · ALL RIGHTS RESERVED
  </text>

  <!-- ════════ USAGE GUIDE (hidden comment) ════════ -->
  <!--
    FILM CLOSING TITLES — USAGE GUIDE
    =================================

    1. IMPORT: Drop into Premiere Pro, After Effects, DaVinci Resolve, or FCP.
       Scale to 1920×1080. The SVG uses viewBox so it scales perfectly.

    2. ALL PLACEHOLDERS NOW FILLED with website content:
       - Tagline: "Enabling every student to practice realistic technical conversations in English"
       - Contact: "wagemutig.github.io/talktech"

    3. PARTNER LOGOS: The partner boxes use text placeholders.
       To use real logos, export them as PNG with transparency and
       overlay in your editor, OR uncomment the <image> section below.

    4. ANIMATION IDEAS (film look):
       - Fade in title from 0% with slight upward drift (y +20 → 0)
       - Stagger team cards: 0.1s delay between each
       - Partner boxes: subtle scale-in (0.95 → 1.0) with opacity
       - Add subtle camera shake or film gate flicker
       - Grain layer is baked in — no extra work needed

    5. COLOR CUSTOMIZATION:
       Edit the gradient stops in <defs> to match your brand.
       Current: #3b82f6 (blue) → #10b981 (emerald)
  -->

  <!-- ════════ REAL LOGO IMAGES (uncomment to use) ════════ -->
  <!--
  <g transform="translate(960, 820)">
    <g transform="translate(-420, 0)">
      <image href="phzh-logo.svg" x="0" y="0" width="200" height="90" preserveAspectRatio="xMidYMid meet"/>
      <image href="afca-logo.svg" x="220" y="0" width="200" height="90" preserveAspectRatio="xMidYMid meet"/>
      <image href="dizh-logo.png" x="440" y="0" width="200" height="90" preserveAspectRatio="xMidYMid meet"/>
      <image href="futuremem-logo.svg" x="660" y="0" width="200" height="90" preserveAspectRatio="xMidYMid meet"/>
    </g>
  </g>
  -->
</svg>
