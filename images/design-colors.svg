    <linearGradient id="glassRule" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.06)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.03)"/>
    </linearGradient>
    <filter id="glassBlur">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
  </defs>

